kind = "web"
previewPath = "/"
title = "VINTRIX Streetwear"
version = "1.0.0"
id = "artifacts/vintrix"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22287

[services.development]
run = "pnpm --filter @workspace/vintrix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vintrix", "run", "build" ]
publicDir = "artifacts/vintrix/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22287"
BASE_PATH = "/"
